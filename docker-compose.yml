# UNetDefence - minimal Docker Compose (API + Postgres)
# Run migrations first: see README
# Optional: add ingest worker and scheduler as separate services

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: unetdefence
      POSTGRES_PASSWORD: unetdefence
      POSTGRES_DB: unetdefence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unetdefence"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      UNETDEFENCE_DATABASE_URL: postgresql://unetdefence:unetdefence@postgres:5432/unetdefence
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: {}
